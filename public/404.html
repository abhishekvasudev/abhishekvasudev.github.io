<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // GitHub Pages SPA routing hack
    var segments = location.pathname.split('/').filter(Boolean);
    if (segments.length > 0) {
      var redirect = segments.join('/');
      var query = location.search ? '&q=' + location.search.slice(1).replace(/&/g, '~and~') : '';
      location.replace(location.origin + '/?p=' + redirect.replace(/&/g, '~and~') + query + location.hash);
    }
  </script>
</head>
<body></body>
</html>
