    <script>
      (function () {
        var q = window.location.search;
        if (q && q.slice(0, 3) === "?p=") {
          var decoded = q.slice(3).split("&q=");
          var newPath = decoded[0].replace(/~and~/g, "&");
          var newSearch = decoded[1] ? "?" + decoded[1].replace(/~and~/g, "&") : "";
          var base = window.location.pathname.replace(/\/$/, "");
          history.replaceState(null, "", base + "/" + newPath.replace(/^\/+/, "") + newSearch + window.location.hash);
        }
      })();
    </script>
