# Netlify deployment configuration
# Build-time prerendering is handled by vite-plugin-prerender (see vite.config.ts).
# Static HTML snapshots are generated for all defined routes at build time.

[build]
  publish = "dist"
  command = "npm run build"

# SPA fallback for non-prerendered paths (human visitors)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Serve prerendered HTML to search engine crawlers when available
[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200
  force = false
  conditions = {User-Agent = ["Googlebot", "Bingbot", "Slurp", "DuckDuckBot", "Baiduspider", "YandexBot", "facebookexternalhit", "Twitterbot", "LinkedInBot", "Applebot"]}
